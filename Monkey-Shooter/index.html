<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Monkey Shooter</title>
  <style>
    /* ═══════════════════════════════════════════
       RESET & BASE (from Coin Clicker theme)
    ═══════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      touch-action: none; /* prevent scrolling/zooming */
    }

    :root {
      --gold:       #f5c518;
      --navy:       #0f3460;
      --navy-light: #16213e;
      --navy-border:#1a3a5c;
      --teal:       #74f2ce;
      --text:       #dde;
      --muted:      #666;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #081120 0%, #16365d 60%, #0e233c 100%);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ═══════════════════════════════════════════
       UI OVERLAYS
    ═══════════════════════════════════════════ */
    #ui-layer {
      position: absolute;
      inset: 0;
      pointer-events: none; /* let touches pass to canvas */
      z-index: 10;
    }

    .hud-element {
      position: absolute;
      pointer-events: auto;
    }

    #back-btn {
      top: 14px; left: 14px;
      background: var(--navy);
      border: 1px solid var(--navy-border);
      color: var(--gold);
      border-radius: 8px;
      padding: 6px 13px;
      font-size: 0.78rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    #back-btn:hover { background: #1a5276; }

    #coin-display {
      top: 14px; right: 14px;
      background: rgba(10, 20, 40, 0.6);
      border: 1px solid var(--navy-border);
      color: var(--gold);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 1.1rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
    }
    #coin-display span { color: #fff; }

    #controls-area {
      bottom: 24px; left: 14px; right: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hud-btn {
      background: rgba(10, 28, 52, 0.82);
      border: 1px solid rgba(116, 242, 206, 0.22);
      color: var(--teal);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      user-select: none;
    }
    .hud-btn:hover {
      background: rgba(20, 48, 80, 0.92);
      border-color: rgba(116,242,206,0.5);
      transform: scale(1.04);
    }
    .hud-btn:active { transform: scale(0.96); }
    .hud-btn.muted {
      color: #6a7f99;
      border-color: rgba(255,255,255,0.08);
    }

    #toast {
      position: fixed;
      top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #1e2a10;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ═══════════════════════════════════════════
       UPGRADES MENU (BOTTOM SHEET)
    ═══════════════════════════════════════════ */
    #menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #menu-backdrop.show { opacity: 1; pointer-events: auto; }

    #menu-overlay {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 70vh;
      background: var(--navy-light);
      border-top: 2px solid var(--navy-border);
      border-radius: 20px 20px 0 0;
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 1.1, 0.64, 1);
    }
    #menu-overlay.open { transform: translateY(0); pointer-events: auto; }

    #menu-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; border-bottom: 1px solid var(--navy);
    }
    #menu-title { font-size: 1rem; font-weight: bold; color: var(--gold); }
    #menu-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }

    #menu-content {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }

    .upgrade-card {
      background: #0d1b36;
      border: 1px solid var(--navy-border);
      border-radius: 12px;
      padding: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .u-info h3 { font-size: 0.9rem; margin-bottom: 3px; color: #fff; }
    .u-info p { font-size: 0.75rem; color: var(--muted); }
    .u-owned { font-size: 0.7rem; color: var(--teal); margin-top: 4px; font-weight: bold; }
    
    .buy-btn {
      background: var(--navy); color: var(--gold);
      border: 1px solid #1a5276; border-radius: 8px;
      padding: 8px 12px; font-size: 0.8rem; font-weight: bold;
      cursor: pointer; min-width: 75px;
    }
    .buy-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .buy-btn:not(:disabled):hover { background: #1a5276; transform: scale(1.05); }

    .idle-hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
      animation: pulse 2s infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.2; } to { opacity: 0.6; } }

  </style>
</head>
<body>

  <canvas id="game"></canvas>

  <div id="ui-layer">
    <a id="back-btn" class="hud-element" href="../index.html">← Games</a>
    <div id="coin-display" class="hud-element">🍌 <span id="coins">0</span></div>
    
    <div class="idle-hint" id="start-hint">Drag monkey to move & shoot!</div>

    <div id="controls-area" class="hud-element">
      <button id="music-btn" class="hud-btn muted" onclick="toggleMusic()">🔇 Music</button>
      <button id="menu-btn" class="hud-btn" onclick="toggleMenu()">🛒 Upgrades</button>
    </div>
  </div>

  <div id="toast"></div>

  <!-- UPGRADES MENU -->
  <div id="menu-backdrop" onclick="toggleMenu()"></div>
  <div id="menu-overlay">
    <div id="menu-header">
      <div id="menu-title">🛒 Upgrades (Auto-Save)</div>
      <button id="menu-close" onclick="toggleMenu()">✕</button>
    </div>
    <div id="menu-content">
      <div class="upgrade-card">
        <div class="u-info">
          <h3>🍌 Banana Damage</h3>
          <p>Increases shot power</p>
          <div class="u-owned">Lv <span id="u-dmg-lv">1</span></div>
        </div>
        <button class="buy-btn" id="b-dmg" onclick="buyUpgrade('dmg')">🍌 <span id="c-dmg">10</span></button>
      </div>
      <div class="upgrade-card">
        <div class="u-info">
          <h3>⚡ Fire Rate</h3>
          <p>Shoots faster</p>
          <div class="u-owned">Lv <span id="u-spd-lv">1</span></div>
        </div>
        <button class="buy-btn" id="b-spd" onclick="buyUpgrade('spd')">🍌 <span id="c-spd">25</span></button>
      </div>
      <div class="upgrade-card">
        <div class="u-info">
          <h3>🌟 Multi-Shot</h3>
          <p>Fires extra bananas</p>
          <div class="u-owned">Lv <span id="u-multi-lv">0</span></div>
        </div>
        <button class="buy-btn" id="b-multi" onclick="buyUpgrade('multi')">🍌 <span id="c-multi">150</span></button>
      </div>
    </div>
  </div>

<script>
/* ════════════════════════════════════════════════
   GAME STATE & STORAGE
════════════════════════════════════════════════ */
const DEF_STATE = {
  coins: 0,
  upgrades: { dmg: 1, spd: 1, multi: 0 }
};
let state = JSON.parse(localStorage.getItem('monkeyShooterSave')) || DEF_STATE;

function saveGame() {
  localStorage.setItem('monkeyShooterSave', JSON.stringify(state));
  updateUI();
}

function getCost(type) {
  const lv = state.upgrades[type];
  if (type === 'dmg') return Math.floor(10 * Math.pow(1.5, lv - 1));
  if (type === 'spd') return Math.floor(25 * Math.pow(1.6, lv - 1));
  if (type === 'multi') return Math.floor(150 * Math.pow(2.2, lv));
  return 999999;
}

function buyUpgrade(type) {
  const cost = getCost(type);
  if (state.coins >= cost) {
    if (type === 'multi' && state.upgrades.multi >= 4) {
      showToast('Max level reached!');
      return;
    }
    state.coins -= cost;
    state.upgrades[type]++;
    if (!_muted) playSoftUpgrade();
    saveGame();
  }
}

function updateUI() {
  document.getElementById('coins').textContent = Math.floor(state.coins);
  
  const dCost = getCost('dmg');
  document.getElementById('u-dmg-lv').textContent = state.upgrades.dmg;
  document.getElementById('c-dmg').textContent = dCost;
  document.getElementById('b-dmg').disabled = state.coins < dCost;

  const sCost = getCost('spd');
  document.getElementById('u-spd-lv').textContent = state.upgrades.spd;
  document.getElementById('c-spd').textContent = sCost;
  document.getElementById('b-spd').disabled = state.coins < sCost;

  const mCost = getCost('multi');
  document.getElementById('u-multi-lv').textContent = state.upgrades.multi >= 4 ? 'MAX' : state.upgrades.multi;
  document.getElementById('c-multi').textContent = state.upgrades.multi >= 4 ? '---' : mCost;
  document.getElementById('b-multi').disabled = state.coins < mCost || state.upgrades.multi >= 4;
}

/* ════════════════════════════════════════════════
   ENGINE SETTINGS & ENTITIES
════════════════════════════════════════════════ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const GAME = {
  player: { x: W/2, y: H - 150, size: 40, emoji: '🐒' },
  bullets: [],
  enemies: [],
  drops: [],      // New: collectables (coins/powerups)
  particles: [],
  powerup: { type: null, time: 0 }, // Active powerup
  stars: [],
  lastShot: 0,
  scoreTexts: []
};

// Init flowing background stars
for(let i=0; i<40; i++) {
  GAME.stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    s: Math.random() * 2 + 1,
    speed: Math.random() * 40 + 20
  });
}

// Input handling (drag to move)
let isDragging = false;
canvas.addEventListener('pointerdown', e => {
  isDragging = true;
  GAME.player.x = e.clientX;
  GAME.player.y = e.clientY - 40; // offset slightly above finger
  document.getElementById('start-hint').style.display = 'none';
  if(!_musicBox && !_muted) startMusic(); // start music on first interact if not muted
});
canvas.addEventListener('pointermove', e => {
  if (isDragging) {
    GAME.player.x = e.clientX;
    GAME.player.y = e.clientY - 40;
  }
});
canvas.addEventListener('pointerup', () => { isDragging = false; });
canvas.addEventListener('pointercancel', () => { isDragging = false; });

/* ════════════════════════════════════════════════
   GAME LOOP
════════════════════════════════════════════════ */
let lastTime = 0;
function loop(time) {
  const dt = (time - lastTime) / 1000;
  lastTime = time;
  
  update(dt, time);
  draw();
  
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt, time) {
  // Constrain player
  if (GAME.player.x < 20) GAME.player.x = 20;
  if (GAME.player.x > W - 20) GAME.player.x = W - 20;
  if (GAME.player.y < 20) GAME.player.y = 20;
  if (GAME.player.y > H - 20) GAME.player.y = H - 20;

  // Auto Shoot (Faster base fire rate)
  let fireInterval = Math.max(0.08, 0.25 - (state.upgrades.spd * 0.015)); 
  if (GAME.powerup.type === 'spd' && GAME.powerup.time > 0) fireInterval /= 2;

  if (time - GAME.lastShot > fireInterval * 1000) {
    GAME.lastShot = time;
    shoot();
  }

  if (GAME.powerup.time > 0) {
    GAME.powerup.time -= dt;
    if (GAME.powerup.time <= 0) GAME.powerup.type = null;
  }

  // Move Bullets
  for (let i = GAME.bullets.length - 1; i >= 0; i--) {
    let b = GAME.bullets[i];
    b.y -= 500 * dt;
    b.x += b.vx * dt;
    if (b.y < -50) GAME.bullets.splice(i, 1);
  }

  // Spawn Enemies (Lower HP)
  if (Math.random() < 0.03 + (state.upgrades.dmg * 0.001)) { 
    const types = [
      { e: '🎈', hp: 1 + state.upgrades.dmg * 0.2, v: 80, s: 35 },
      { e: '☁️', hp: 2 + state.upgrades.dmg * 0.6, v: 50, s: 50 },
      { e: '🛸', hp: 4 + state.upgrades.dmg * 1.0, v: 120, s: 40 }
    ];
    let type = types[Math.floor(Math.random() * types.length)];
    // Boss chance
    if (Math.random() < 0.05) { type = { e: '👾', hp: 20 + state.upgrades.dmg * 2, v: 30, s: 80 }; }

    GAME.enemies.push({
      x: Math.random() * (W - 60) + 30,
      y: -50,
      vx: (Math.random() - 0.5) * 40,
      hp: type.hp, maxHp: type.hp,
      emoji: type.e, speed: type.v, size: type.s,
      wobble: Math.random() * Math.PI * 2
    });
  }

  // Move Enemies & Collisions
  for (let i = GAME.enemies.length - 1; i >= 0; i--) {
    let e = GAME.enemies[i];
    e.y += e.speed * dt;
    e.x += (Math.sin(time/500 + e.wobble) * 30 + e.vx) * dt;

    if (e.y > H + 50) { GAME.enemies.splice(i, 1); continue; }

    // Bullet Hit
    for (let j = GAME.bullets.length - 1; j >= 0; j--) {
      let b = GAME.bullets[j];
      let dx = e.x - b.x;
      let dy = e.y - b.y;
      if (Math.sqrt(dx*dx + dy*dy) < (e.size/2 + 15)) {
        // Hit!
        e.hp -= state.upgrades.dmg;
        GAME.bullets.splice(j, 1);
        spawnParticles(b.x, b.y, '#f5c518');
        if (!_muted) playHitSound();

        if (e.hp <= 0) {
          // Kill
          let val = Math.ceil(e.maxHp * 0.5);
          // Spawn Drop instead of auto-collect
          let isPowerup = Math.random() < 0.08; 
          let pType = null;
          if (isPowerup) {
            const pts = ['spd', 'bomb', 'multi'];
            pType = pts[Math.floor(Math.random() * pts.length)];
          }
          GAME.drops.push({
            x: e.x, y: e.y,
            type: isPowerup ? 'powerup' : 'banana',
            val: val,
            pType: pType,
            vx: (Math.random() - 0.5) * 100,
            vy: -100 - Math.random() * 50
          });

          spawnParticles(e.x, e.y, '#74f2ce', 8);
          GAME.enemies.splice(i, 1);
          if (!_muted) playKillSound();
          break; // enemy dead, stop bullet loop
        }
      }
    }
  }

  // Move Drops & Collection
  let px = GAME.player.x;
  let py = GAME.player.y;
  for (let i = GAME.drops.length - 1; i >= 0; i--) {
    let d = GAME.drops[i];
    d.vy += 400 * dt; // gravity
    d.x += d.vx * dt;
    d.y += d.vy * dt;

    if (d.y > H + 50) { GAME.drops.splice(i, 1); continue; }

    // Magnet effect towards player if close
    let dx = px - d.x; let dy = py - d.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 150) {
      d.x += (dx / dist) * 300 * dt;
      d.y += (dy / dist) * 300 * dt;
    }

    // Collection test
    if (dist < 40) {
      if (d.type === 'banana') {
        state.coins += d.val;
        saveGame();
        spawnScoreText(d.x, d.y, '+' + d.val);
        if (!_muted) playHitSound();
      } else if (d.type === 'powerup') {
        if (d.pType === 'bomb') {
          spawnScoreText(W/2, H/2, 'BOOM!');
          GAME.enemies.forEach(en => {
            spawnParticles(en.x, en.y, '#f53b57', 10);
            state.coins += Math.ceil(en.maxHp * 0.5);
          });
          saveGame();
          GAME.enemies = [];
          if (!_muted) playKillSound();
        } else {
          GAME.powerup.type = d.pType;
          GAME.powerup.time = 5.0; // 5 seconds
          spawnScoreText(d.x, d.y, d.pType.toUpperCase() + '!');
          if (!_muted) playSoftUpgrade();
        }
      }
      GAME.drops.splice(i, 1);
    }
  }

  // Move background stars
  GAME.stars.forEach(s => {
    s.y += s.speed * dt;
    if (s.y > H) { s.y = -10; s.x = Math.random() * W; }
  });

  // Particles
  for (let i = GAME.particles.length - 1; i >= 0; i--) {
    let p = GAME.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) GAME.particles.splice(i, 1);
  }

  // Score Texts
  for (let i = GAME.scoreTexts.length - 1; i >= 0; i--) {
    let st = GAME.scoreTexts[i];
    st.y -= 40 * dt;
    st.life -= dt;
    if (st.life <= 0) GAME.scoreTexts.splice(i, 1);
  }
}

function shoot() {
  let m = state.upgrades.multi; // 0, 1, 2, 3, 4
  if (GAME.powerup.type === 'multi') m += 2;

  const px = GAME.player.x;
  const py = GAME.player.y - 20;
  
  // Base bullet
  GAME.bullets.push({ x: px, y: py, vx: 0 });
  
  if (m >= 1) { GAME.bullets.push({ x: px - 20, y: py + 10, vx: -40 }); GAME.bullets.push({ x: px + 20, y: py + 10, vx: 40 }); }
  if (m >= 2) { GAME.bullets.push({ x: px - 10, y: py, vx: -15 }); GAME.bullets.push({ x: px + 10, y: py, vx: 15 }); }
  if (m >= 3) { GAME.bullets.push({ x: px - 35, y: py + 20, vx: -80 }); GAME.bullets.push({ x: px + 35, y: py + 20, vx: 80 }); }
  if (m >= 4) { GAME.bullets.push({ x: px - 25, y: py + 5, vx: -30 }); GAME.bullets.push({ x: px + 25, y: py + 5, vx: 30 }); }

  if (!_muted) playShootSound();
}

function spawnParticles(x, y, color, count=4) {
  for(let i=0; i<count; i++){
    GAME.particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*150, vy: (Math.random()-0.5)*150,
      life: Math.random()*0.3 + 0.2, maxLife: 0.5, color: color
    });
  }
}

function spawnScoreText(x, y, txt) {
  GAME.scoreTexts.push({ x: x, y: y, text: txt, life: 1.0 });
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  GAME.stars.forEach(s => {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 9); ctx.fill();
  });

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Bullets
  ctx.font = '24px Arial';
  GAME.bullets.forEach(b => { ctx.fillText('🍌', b.x, b.y); });

  // Drops
  GAME.drops.forEach(d => {
    if (d.type === 'banana') {
      ctx.font = '20px Arial';
      ctx.fillText('🍌', d.x, d.y);
    } else {
      ctx.font = '28px Arial';
      let icon = '🎁';
      if (d.pType === 'bomb') icon = '💣';
      else if (d.pType === 'spd') icon = '⚡';
      else if (d.pType === 'multi') icon = '🌟';
      ctx.fillText(icon, d.x, d.y);
    }
  });

  // Enemies
  GAME.enemies.forEach(e => {
    ctx.font = e.size + 'px Arial';
    ctx.fillText(e.emoji, e.x, e.y);
    // HP bar
    if (e.hp < e.maxHp) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(e.x - 15, e.y - e.size/2 - 10, 30, 4);
      ctx.fillStyle = '#74f2ce';
      ctx.fillRect(e.x - 15, e.y - e.size/2 - 10, 30 * (e.hp/e.maxHp), 4);
    }
  });

  // Player (Monkey)
  ctx.font = GAME.player.size + 'px Arial';
  ctx.fillText(GAME.player.emoji, GAME.player.x, GAME.player.y);
  
  // Aura under player
  let glow = 20 + Math.sin(Date.now()/300)*5;
  let grd = ctx.createRadialGradient(GAME.player.x, GAME.player.y+10, 0, GAME.player.x, GAME.player.y+10, glow);
  grd.addColorStop(0, 'rgba(245, 197, 24, 0.4)');
  grd.addColorStop(1, 'rgba(245, 197, 24, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(GAME.player.x, GAME.player.y+10, glow, 0, 9); ctx.fill();

  // Particles
  GAME.particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 9); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Score texts
  ctx.font = 'bold 20px "Segoe UI"';
  GAME.scoreTexts.forEach(st => {
    ctx.globalAlpha = st.life;
    ctx.fillStyle = '#f5c518';
    ctx.fillText(st.text, st.x, st.y);
  });
  ctx.globalAlpha = 1;
}

/* ════════════════════════════════════════════════
   WEB AUDIO API - RELAXING SOUNDS & MUSIC
════════════════════════════════════════════════ */
let _audioCtx = null;
let _muted = true;
let _musicBox = null;

function getCtx() {
  if (!_audioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    _audioCtx = new Ctx();
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playShootSound() {
  const ctx = getCtx(); if (!ctx) return;
  const osc = ctx.createOscillator(); const gain = ctx.createGain(); const t = ctx.currentTime;
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, t); osc.frequency.exponentialRampToValueAtTime(300, t + 0.1);
  gain.gain.setValueAtTime(0.02, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.15);
}

function playHitSound() {
  const ctx = getCtx(); if (!ctx) return;
  const osc = ctx.createOscillator(); const gain = ctx.createGain(); const t = ctx.currentTime;
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(150, t + 0.1);
  gain.gain.setValueAtTime(0.03, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.15);
}

function playKillSound() {
  const ctx = getCtx(); if (!ctx) return;
  const osc = ctx.createOscillator(); const gain = ctx.createGain(); const t = ctx.currentTime;
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, t); osc.frequency.linearRampToValueAtTime(800, t + 0.1);
  gain.gain.setValueAtTime(0.04, t); gain.gain.linearRampToValueAtTime(0, t + 0.15);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 0.2);
}

function playSoftUpgrade() {
  const ctx = getCtx(); if (!ctx) return;
  [523.25, 659.25, 783.99].forEach((freq, i) => {
    const osc = ctx.createOscillator(); const gain = ctx.createGain(); const t = ctx.currentTime + i*0.1;
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.04, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.35);
  });
}

// Lullaby Music Box
const LULLABY_NOTES = [
  261.63, 261.63, 392.00, 392.00, 440.00, 440.00, 392.00, // C C G G A A G
  349.23, 349.23, 329.63, 329.63, 293.66, 293.66, 261.63  // F F E E D D C
];
let _musicNoteIdx = 0;

function _playNextMusicNote() {
  if (_muted) return;
  const ctx = getCtx(); if (!ctx) return;
  
  if (!_musicBox) {
    _musicBox = ctx.createGain();
    _musicBox.gain.value = 0.05; // very quiet relaxing music
    _musicBox.connect(ctx.destination);
  }

  const freq = LULLABY_NOTES[_musicNoteIdx % LULLABY_NOTES.length];
  _musicNoteIdx++;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const t = ctx.currentTime;
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);
  
  // Soft plucking sound (music box)
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.8, t + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
  
  osc.connect(gain); gain.connect(_musicBox);
  osc.start(t); osc.stop(t + 1.5);

  setTimeout(_playNextMusicNote, 800);
}

function toggleMusic() {
  _muted = !_muted;
  const btn = document.getElementById('music-btn');
  if (_muted) {
    btn.textContent = '🔇 Music'; btn.classList.add('muted');
  } else {
    btn.textContent = '🎵 Music'; btn.classList.remove('muted');
    getCtx();
    if (!_musicBox) _playNextMusicNote();
  }
}

function startMusic() {
  _muted = false;
  const btn = document.getElementById('music-btn');
  btn.textContent = '🎵 Music'; btn.classList.remove('muted');
  _playNextMusicNote();
}

/* ════════════════════════════════════════════════
   UI TOGGLES
════════════════════════════════════════════════ */
function toggleMenu() {
  const overlay = document.getElementById('menu-overlay');
  const backdrop = document.getElementById('menu-backdrop');
  const isOpen = overlay.classList.contains('open');
  if (isOpen) {
    overlay.classList.remove('open'); backdrop.classList.remove('show');
  } else {
    overlay.classList.add('open'); backdrop.classList.add('show');
    updateUI();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init run
updateUI();

</script>
